apis:
  - aid: planable:planable-api
    name: Planable Public API
    description: The Planable Public API enables programmatic management of workspace data, including drafting and scheduling posts from a CMS, syncing media libraries from external asset tools, pulling analytics into custom dashboards, and keeping workspace structure in sync with team organization. Authentication uses scoped bearer tokens (read or read/write) restricted to specific workspaces.
    humanURL: https://planable.io/
    baseURL: https://app.planable.io/api
