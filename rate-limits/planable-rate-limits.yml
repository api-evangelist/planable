name: Planable API Rate Limits
description: Rate limiting information for the Planable Public API.
url: https://planable.io/
notes: Planable does not publish explicit numeric rate limits in their public documentation. The following reflects what is known from public sources as of June 2026.

authentication:
  type: Bearer Token
  description: API tokens are generated by company owners and administrators. Tokens are scoped to read or read/write access and can be restricted to specific workspaces. Tokens can be set to expire on a custom schedule.
  tokenTypes:
    - scope: read
      description: Read-only access to workspace data
    - scope: read-write
      description: Full read and write access to workspace data
  whoCanGenerate: Company owners and administrators only

postLimits:
  description: Post creation limits are determined by the subscription plan, not explicit API rate limits.
  byPlan:
    - plan: Basic
      postsPerWorkspacePerMonth: 60
    - plan: Pro
      postsPerWorkspacePerMonth: 150
    - plan: Enterprise
      postsPerWorkspacePerMonth: unlimited

knownLimits:
  - type: Post volume
    description: Posts created via API count toward the workspace monthly post quota defined by the subscription plan
  - type: Token scope
    description: API tokens can be restricted to specific workspaces, limiting the blast radius of any single token

statusPage: https://status.planable.io/public-api

disclaimer: Planable does not publicly document numeric request-per-second or request-per-day rate limits. Contact Planable support for enterprise-level API rate limit details.
